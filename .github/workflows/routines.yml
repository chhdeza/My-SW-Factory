# Generated by `factory routine generate-ci`. Do not edit by hand.
name: Factory routines

on:
  workflow_dispatch:
    inputs:
      routine:
        description: Routine name to run
        required: true
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  daily_log_review:
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.routine == 'daily_log_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: factory routine run daily_log_review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  daily_report:
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.routine == 'daily_report'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: factory routine run daily_report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  weekly_dep_audit:
    if: github.event.schedule == '0 6 * * 1' || github.event.inputs.routine == 'weekly_dep_audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: factory routine run weekly_dep_audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
