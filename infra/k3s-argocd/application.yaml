# Argo CD Application template - edit repoURL/path/namespace for your app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: factory-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/REPO
    targetRevision: main
    path: deploy/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
